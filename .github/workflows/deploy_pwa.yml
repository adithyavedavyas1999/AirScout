name: Deploy PWA

on:
  push:
    branches: [main]
    paths: ['pwa/**']
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - name: Create config.js with secrets
        env:
          SB_URL: ${{ secrets.SUPABASE_URL }}
          SB_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          VAPID_KEY: ${{ secrets.VAPID_PUBLIC_KEY }}
        run: |
          printf 'const AIRSCOUT_CONFIG = {\n  SUPABASE_URL: "%s",\n  SUPABASE_ANON_KEY: "%s",\n  VAPID_PUBLIC_KEY: "%s"\n};\n' "$SB_URL" "$SB_KEY" "$VAPID_KEY" > pwa/config.js

      - uses: actions/configure-pages@v4
      - uses: actions/upload-pages-artifact@v3
        with:
          path: 'pwa'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
